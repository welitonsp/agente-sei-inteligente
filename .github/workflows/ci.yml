name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "codex/**"

permissions:
  contents: read

jobs:
  tests:
    name: Tests and security gate (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.13"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check committed secrets
        run: python scripts/check_no_secrets.py .

      - name: Run tests
        run: python -m pytest

      - name: Run agent readiness evaluations
        run: python scripts/run_agent_evals.py
